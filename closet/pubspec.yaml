name: closet
description: "CLOSET — AI 패션 코디 앱"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.5.0
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  flutter_dotenv: ^5.1.0
  google_sign_in: ^6.2.1
  http: ^1.2.1
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2
  geolocator: ^12.0.0
  google_generative_ai: ^0.4.3
  table_calendar: ^3.1.2
  intl: ^0.19.0
  google_fonts: ^6.2.1

dependency_overrides:
  shared_preferences_android: 2.4.13

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - .env
